name: F1 Sim

on:
  workflow_dispatch:
  schedule:
    # Runs every Friday, Saturday and Sunday at 08:00 UTC
    - cron: "0 8 * * 5,6,0"

permissions:
  contents: read

jobs:
  run-f1-sim:
    name: Run F1 simulation
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      POST_TO_DISCORD: "false"
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run simulation
        run: |
          python main.py

      - name: Upload generated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f1-sim-outputs
          path: |
            outputs/
            data/fantasy_prices.csv
          if-no-files-found: ignore