name: Bug report
description: Report a reproducible problem in the simulator, app, docs, or generated outputs.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid sharing secrets, private data, or full generated datasets unless they are already safe to publish.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The portable app fails when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact commands, app actions, or config changes needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the relevant error message or traceback.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.2.0-alpha.1 or commit SHA
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - CLI simulation
        - Portable app
        - Packaging/build
        - Data sources
        - Historical calibration
        - Tyre strategy
        - Fantasy scoring
        - Documentation
        - Other
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, shell, and any relevant dependency details.
      placeholder: Windows 11, PowerShell, Python 3.x
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste only the relevant log lines or attach screenshots. Remove secrets and private data first.
      render: text
